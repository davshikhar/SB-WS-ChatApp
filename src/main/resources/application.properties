spring.application.name=WS-Chat

server.port=8080

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.suffix=.html
spring.thymeleaf.prefix=classpath:/templates/

spring.datasource.url=jdbc:h2:mem:chatdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

#This tells the h2-console to only open from localhost.
spring.h2.console.settings.web-allow-others=false
spring.h2.console.settings.trace=false

# H2 browser ui
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645103466B5970
jwt.expiration-ms=86400000

logging.level.com.chat=DEBUG
