<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>LiveChat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0a0a0f;
            --surface:   #111118;
            --surface2:  #18181f;
            --border:    #2a2a35;
            --accent:    #7c6aff;
            --accent2:   #ff6a8a;
            --accent3:   #6affd4;
            --text:      #e8e8f0;
            --muted:     #6b6b80;
            --online:    #3ddc84;
            --radius:    14px;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            overflow: hidden;
        }

        /* ─── Login Screen ─── */
        #login-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 100;
            animation: fadeIn .4s ease;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 44px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -80px; left: 50%;
            transform: translateX(-50%);
            width: 260px; height: 260px;
            background: radial-gradient(circle, rgba(124,106,255,.18) 0%, transparent 70%);
            pointer-events: none;
        }

        .login-logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 2.2rem;
            letter-spacing: -1px;
            margin-bottom: 6px;
        }

        .login-logo span { color: var(--accent); }

        .login-sub {
            color: var(--muted);
            font-size: .78rem;
            margin-bottom: 36px;
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        .input-group input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 18px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: .88rem;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }

        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124,106,255,.15);
        }

        .input-group input::placeholder { color: var(--muted); }

        .btn-join {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            padding: 14px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: .95rem;
            letter-spacing: .5px;
            cursor: pointer;
            transition: opacity .2s, transform .1s;
            margin-top: 4px;
        }

        .btn-join:hover { opacity: .88; }
        .btn-join:active { transform: scale(.98); }

        /* ─── App Shell ─── */
        #app {
            display: none;
            height: 100vh;
            display: none;
            grid-template-columns: 240px 1fr;
            grid-template-rows: 1fr;
        }

        #app.visible {
            display: grid;
        }

        /* ─── Sidebar ─── */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 0;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 24px 20px 20px;
            border-bottom: 1px solid var(--border);
        }

        .brand {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.3rem;
            letter-spacing: -0.5px;
        }

        .brand span { color: var(--accent); }

        .brand-sub {
            font-size: .7rem;
            color: var(--muted);
            margin-top: 2px;
        }

        .channels-label {
            font-size: .65rem;
            letter-spacing: 2px;
            color: var(--muted);
            padding: 20px 20px 8px;
            text-transform: uppercase;
        }

        .channel-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            border-radius: 10px;
            margin: 2px 10px;
            cursor: pointer;
            font-size: .82rem;
            color: var(--muted);
            transition: background .15s, color .15s;
        }

        .channel-item.active {
            background: rgba(124,106,255,.15);
            color: var(--text);
        }

        .channel-item .hash {
            color: var(--accent);
            font-weight: 600;
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-dot {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex; align-items: center; justify-content: center;
            font-size: .72rem;
            font-weight: 600;
            flex-shrink: 0;
            position: relative;
        }

        .user-dot::after {
            content: '';
            position: absolute;
            bottom: 1px; right: 1px;
            width: 9px; height: 9px;
            border-radius: 50%;
            background: var(--online);
            border: 2px solid var(--surface);
        }

        .user-info { overflow: hidden; }
        .user-name { font-size: .82rem; font-weight: 500; truncate }
        .user-status { font-size: .68rem; color: var(--online); }

        /* ─── Chat Area ─── */
        .chat-area {
            display: flex;
            flex-direction: column;
            background: var(--bg);
            overflow: hidden;
        }

        .chat-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header-name {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1rem;
        }

        .chat-header-name .hash { color: var(--accent); margin-right: 4px; }

        .online-badge {
            background: rgba(61, 220, 132, .12);
            color: var(--online);
            font-size: .65rem;
            padding: 3px 9px;
            border-radius: 20px;
            border: 1px solid rgba(61, 220, 132, .25);
        }

        .pulse {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--online);
            margin-right: 5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .3; }
        }

        /* ─── Messages ─── */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            scroll-behavior: smooth;
        }

        #messages::-webkit-scrollbar { width: 4px; }
        #messages::-webkit-scrollbar-track { background: transparent; }
        #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

        .msg {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 6px 8px;
            border-radius: 10px;
            animation: slideIn .2s ease;
            transition: background .15s;
            max-width: 720px;
        }

        .msg:hover { background: rgba(255,255,255,.025); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: .68rem;
            font-weight: 600;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .msg-body { flex: 1; min-width: 0; }

        .msg-meta {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 3px;
        }

        .msg-sender {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: .82rem;
        }

        .msg-time {
            font-size: .65rem;
            color: var(--muted);
        }

        .msg-text {
            font-size: .84rem;
            line-height: 1.6;
            color: #c8c8d8;
            word-break: break-word;
        }

        /* System events */
        .system-msg {
            text-align: center;
            font-size: .72rem;
            color: var(--muted);
            padding: 8px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            animation: fadeIn .3s ease;
        }

        .system-msg::before,
        .system-msg::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
            max-width: 80px;
        }

        /* ─── Input Bar ─── */
        .input-bar {
            padding: 16px 24px 20px;
            flex-shrink: 0;
        }

        .input-wrap {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            transition: border-color .2s, box-shadow .2s;
        }

        .input-wrap:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124,106,255,.12);
        }

        #msg-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: .86rem;
            resize: none;
            height: 24px;
            max-height: 100px;
            line-height: 1.5;
        }

        #msg-input::placeholder { color: var(--muted); }

        .send-btn {
            background: var(--accent);
            border: none;
            border-radius: 10px;
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: opacity .2s, transform .1s;
            flex-shrink: 0;
        }

        .send-btn:hover { opacity: .85; }
        .send-btn:active { transform: scale(.93); }

        .send-btn svg { width: 16px; height: 16px; fill: #fff; }

        /* Typing indicator */
        .typing-hint {
            font-size: .68rem;
            color: var(--muted);
            padding: 4px 8px 0;
            min-height: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 640px) {
            #app.visible { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>
<body>

<!-- ═══════════════════ LOGIN SCREEN ═══════════════════ -->
<div id="login-screen">
    <div class="login-card">
        <div class="login-logo">Live<span>Chat</span></div>
        <div class="login-sub">// real-time messaging over websocket</div>

        <div class="input-group">
            <input id="username-input" type="text"
                   placeholder="choose your username"
                   maxlength="24" autocomplete="off"/>
        </div>
        <button class="btn-join" onclick="joinChat()">join channel →</button>
    </div>
</div>

<!-- ═══════════════════ MAIN APP ═══════════════════ -->
<div id="app">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="brand">Live<span>Chat</span></div>
            <div class="brand-sub">// websocket powered</div>
        </div>

        <div class="channels-label">Channels</div>
        <div class="channel-item active">
            <span class="hash">#</span> general
        </div>

        <div class="sidebar-footer">
            <div class="user-dot" id="sidebar-avatar">--</div>
            <div class="user-info">
                <div class="user-name" id="sidebar-name">---</div>
                <div class="user-status">● online</div>
            </div>
        </div>
    </div>

    <!-- Chat -->
    <div class="chat-area">
        <div class="chat-header">
            <div class="chat-header-left">
                <div class="chat-header-name"><span class="hash">#</span>general</div>
                <div class="online-badge"><span class="pulse"></span>live</div>
            </div>
        </div>

        <div id="messages"></div>

        <div class="input-bar">
            <div class="input-wrap">
                <textarea id="msg-input" placeholder="message #general…" rows="1"></textarea>
                <button class="send-btn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
            <div class="typing-hint" id="typing-hint"></div>
        </div>
    </div>
</div>

<!-- SockJS + STOMP -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script>
    let stompClient = null;
    let username = null;

    // Avatar colour palette
    const COLORS = [
        ['#7c6aff','#4a3acc'],
        ['#ff6a8a','#cc3a5a'],
        ['#6affd4','#3accaa'],
        ['#ffc96a','#cc993a'],
        ['#6ab4ff','#3a84cc'],
        ['#d46aff','#a43acc'],
    ];

    function colorFor(name) {
        let h = 0;
        for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) | 0;
        return COLORS[Math.abs(h) % COLORS.length];
    }

    function getInitials(name) {
        const parts = name.trim().split(/\s+/);
        if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
        return name.substring(0, 2).toUpperCase();
    }

    /* ─── Join ─── */
    function joinChat() {
        const val = document.getElementById('username-input').value.trim();
        if (!val) {
            document.getElementById('username-input').style.borderColor = 'var(--accent2)';
            return;
        }
        username = val;
        connect();
    }

    document.getElementById('username-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') joinChat();
    });

    /* ─── WebSocket connection ─── */
    function connect() {
        const socket = new SockJS('/ws-chat');
        stompClient = Stomp.over(socket);
        stompClient.debug = null; // silence console noise

        stompClient.connect({}, onConnected, onError);
    }

    function onConnected() {
        // Subscribe to the public channel
        stompClient.subscribe('/topic/public', onMessageReceived);

        // Tell the server this user joined
        stompClient.send('/app/chat.addUser',
            {},
            JSON.stringify({ sender: username, type: 'JOIN' })
        );

        // Update UI
        const [bg, shadow] = colorFor(username);
        const avatarEl = document.getElementById('sidebar-avatar');
        avatarEl.textContent = getInitials(username);
        avatarEl.style.background = `linear-gradient(135deg, ${bg}, ${shadow})`;

        document.getElementById('sidebar-name').textContent = username;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').classList.add('visible');
        document.getElementById('msg-input').focus();
    }

    function onError(err) {
        console.error('STOMP error', err);
        document.getElementById('typing-hint').textContent = '⚠ connection error — retrying…';
    }

    /* ─── Send ─── */
    function sendMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if (!text || !stompClient) return;

        stompClient.send('/app/chat.send',
            {},
            JSON.stringify({ sender: username, content: text, type: 'CHAT' })
        );
        input.value = '';
        input.style.height = '24px';
    }

    document.getElementById('msg-input').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // Auto-resize textarea
    document.getElementById('msg-input').addEventListener('input', function () {
        this.style.height = '24px';
        this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });

    /* ─── Receive ─── */
    function onMessageReceived(payload) {
        const msg = JSON.parse(payload.body);
        const container = document.getElementById('messages');

        if (msg.type === 'JOIN' || msg.type === 'LEAVE') {
            const el = document.createElement('div');
            el.className = 'system-msg';
            el.textContent = msg.content;
            container.appendChild(el);
        } else {
            const isSelf = msg.sender === username;
            const [bg] = colorFor(msg.sender);

            const el = document.createElement('div');
            el.className = 'msg';
            el.innerHTML = `
                <div class="avatar" style="background:${bg}20;color:${bg};border:1px;solid ${bg}40">
                    ${getInitials(msg.sender)}
                </div>
                <div class="msg-body">
                    <div class="msg-meta">
                        <span class="msg-sender" style="color:${bg}">${escHtml(msg.sender)}</span>
                        <span class="msg-time">${msg.timestamp || ''}</span>
                    </div>
                    <div class="msg-text">${escHtml(msg.content)}</div>
                </div>`;
            container.appendChild(el);
        }

        container.scrollTop = container.scrollHeight;
    }

    function escHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
</script>
</body>
</html>
