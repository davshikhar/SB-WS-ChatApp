<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>LiveChat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0a0a0f;
            --surface:   #111118;
            --surface2:  #18181f;
            --border:    #2a2a35;
            --accent:    #7c6aff;
            --accent2:   #ff6a8a;
            --accent3:   #6affd4;
            --text:      #e8e8f0;
            --muted:     #6b6b80;
            --online:    #3ddc84;
            --radius:    14px;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            overflow: hidden;
        }

        /* ─── Login Screen ─── */
        #login-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 100;
            animation: fadeIn .4s ease;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 44px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -80px; left: 50%;
            transform: translateX(-50%);
            width: 260px; height: 260px;
            background: radial-gradient(circle, rgba(124,106,255,.18) 0%, transparent 70%);
            pointer-events: none;
        }

        .login-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2.2rem; letter-spacing: -1px; margin-bottom: 6px; }
        .login-logo span { color: var(--accent); }
        .login-sub { color: var(--muted); font-size: .78rem; margin-bottom: 36px; }

        .input-group { position: relative; margin-bottom: 16px; }
        .input-group input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 18px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: .88rem;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .input-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,106,255,.15); }
        .input-group input::placeholder { color: var(--muted); }

        .btn-join {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            padding: 14px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: .95rem;
            letter-spacing: .5px;
            cursor: pointer;
            transition: opacity .2s, transform .1s;
            margin-top: 4px;
        }
        .btn-join:hover { opacity: .88; }
        .btn-join:active { transform: scale(.98); }

        /* ─── App Shell ─── */
        #app {
            height: 100vh;
            display: none;
            grid-template-columns: 260px 1fr;
            grid-template-rows: 1fr;
        }
        #app.visible { display: grid; }

        /* ─── Sidebar ─── */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header { padding: 24px 20px 20px; border-bottom: 1px solid var(--border); }
        .brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.3rem; letter-spacing: -0.5px; }
        .brand span { color: var(--accent); }
        .brand-sub { font-size: .7rem; color: var(--muted); margin-top: 2px; }

        .channels-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 20px 8px;
        }
        .channels-label { font-size: .65rem; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }

        .btn-new-channel {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--muted);
            font-size: .72rem;
            font-family: 'DM Mono', monospace;
            cursor: pointer;
            padding: 3px 8px;
            transition: border-color .2s, color .2s;
        }
        .btn-new-channel:hover { border-color: var(--accent); color: var(--accent); }

        .channels-list { flex: 1; overflow-y: auto; padding-bottom: 8px; }

        .channel-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 9px 16px 9px 20px;
            border-radius: 10px;
            margin: 2px 10px;
            cursor: pointer;
            font-size: .82rem;
            color: var(--muted);
            transition: background .15s, color .15s;
        }
        .channel-item:hover { background: rgba(255,255,255,.04); color: var(--text); }
        .channel-item.active { background: rgba(124,106,255,.15); color: var(--text); }
        .channel-item .hash { color: var(--accent); font-weight: 600; margin-right: 6px; }
        .channel-item .ch-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .channel-item .ch-type { font-size: .6rem; color: var(--muted); margin-left: 6px; }

        .btn-invite {
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: .7rem;
            font-family: 'DM Mono', monospace;
            padding: 2px 6px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity .15s, color .15s;
            white-space: nowrap;
        }
        .channel-item:hover .btn-invite { opacity: 1; }
        .btn-invite:hover { color: var(--accent3); }

        .sidebar-footer {
            margin-top: auto;
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-dot {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex; align-items: center; justify-content: center;
            font-size: .72rem; font-weight: 600; flex-shrink: 0;
            position: relative;
        }
        .user-dot::after {
            content: '';
            position: absolute;
            bottom: 1px; right: 1px;
            width: 9px; height: 9px;
            border-radius: 50%;
            background: var(--online);
            border: 2px solid var(--surface);
        }
        .user-info { overflow: hidden; }
        .user-name { font-size: .82rem; font-weight: 500; }
        .user-status { font-size: .68rem; color: var(--online); }

        /* ─── Chat Area ─── */
        .chat-area { display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }

        .chat-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .chat-header-left { display: flex; align-items: center; gap: 10px; }
        .chat-header-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; }
        .chat-header-name .hash { color: var(--accent); margin-right: 4px; }

        .online-badge {
            background: rgba(61, 220, 132, .12);
            color: var(--online);
            font-size: .65rem;
            padding: 3px 9px;
            border-radius: 20px;
            border: 1px solid rgba(61, 220, 132, .25);
        }
        .pulse { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--online); margin-right: 5px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }

        /* ─── Messages ─── */
        #messages {
            flex: 1; overflow-y: auto;
            padding: 24px 24px 16px;
            display: flex; flex-direction: column; gap: 2px;
            scroll-behavior: smooth;
        }
        #messages::-webkit-scrollbar { width: 4px; }
        #messages::-webkit-scrollbar-track { background: transparent; }
        #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

        .msg {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 6px 8px; border-radius: 10px;
            animation: slideIn .2s ease; transition: background .15s;
            max-width: 720px;
        }
        .msg:hover { background: rgba(255,255,255,.025); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .68rem; font-weight: 600; flex-shrink: 0; margin-top: 2px; }
        .msg-body { flex: 1; min-width: 0; }
        .msg-meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px; }
        .msg-sender { font-family: 'Syne', sans-serif; font-weight: 600; font-size: .82rem; }
        .msg-time { font-size: .65rem; color: var(--muted); }
        .msg-text { font-size: .84rem; line-height: 1.6; color: #c8c8d8; word-break: break-word; }

        .system-msg {
            text-align: center; font-size: .72rem; color: var(--muted);
            padding: 8px 0; display: flex; align-items: center; justify-content: center; gap: 8px;
            animation: fadeIn .3s ease;
        }
        .system-msg::before, .system-msg::after { content: ''; flex: 1; height: 1px; background: var(--border); max-width: 80px; }

        /* ─── Input Bar ─── */
        .input-bar { padding: 16px 24px 20px; flex-shrink: 0; }
        .input-wrap {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px;
            transition: border-color .2s, box-shadow .2s;
        }
        .input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,106,255,.12); }

        #msg-input {
            flex: 1; background: transparent; border: none; outline: none;
            color: var(--text); font-family: 'DM Mono', monospace; font-size: .86rem;
            resize: none; height: 24px; max-height: 100px; line-height: 1.5;
        }
        #msg-input::placeholder { color: var(--muted); }

        .send-btn {
            background: var(--accent); border: none; border-radius: 10px;
            width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: opacity .2s, transform .1s; flex-shrink: 0;
        }
        .send-btn:hover { opacity: .85; }
        .send-btn:active { transform: scale(.93); }
        .send-btn svg { width: 16px; height: 16px; fill: #fff; }

        .typing-hint { font-size: .68rem; color: var(--muted); padding: 4px 8px 0; min-height: 20px; }

        /* ─── Modal ─── */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,.6);
            z-index: 200;
            align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px 32px;
            width: 100%; max-width: 380px;
            position: relative;
        }
        .modal h2 { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }
        .modal label { font-size: .72rem; color: var(--muted); display: block; margin-bottom: 6px; margin-top: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .modal input, .modal select {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 14px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: .85rem;
            outline: none;
        }
        .modal select option { background: var(--surface2); }
        .modal input:focus, .modal select:focus { border-color: var(--accent); }

        .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
        .btn-modal {
            flex: 1; padding: 12px;
            border: none; border-radius: 10px;
            font-family: 'Syne', sans-serif; font-weight: 700; font-size: .85rem;
            cursor: pointer; transition: opacity .2s;
        }
        .btn-modal.primary { background: var(--accent); color: #fff; }
        .btn-modal.secondary { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
        .btn-modal:hover { opacity: .85; }

        .modal-close {
            position: absolute; top: 14px; right: 16px;
            background: transparent; border: none; color: var(--muted);
            font-size: 1.2rem; cursor: pointer;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 640px) {
            #app.visible { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>
<body>

<!-- ═══════════════════ LOGIN SCREEN ═══════════════════ -->
<div id="login-screen">
    <div class="login-card">
        <div class="login-logo">Live<span>Chat</span></div>
        <div class="login-sub">// real-time messaging over websocket</div>
        <div class="input-group">
            <input id="username-input" type="text" placeholder="username" maxlength="24" autocomplete="off"/>
        </div>
        <div class="input-group">
            <input id="email-input" type="email" placeholder="email (register only)" maxlength="50" autocomplete="off"/>
        </div>
        <div class="input-group">
            <input id="password-input" type="password" placeholder="password" maxlength="50" autocomplete="off"/>
        </div>
        <button class="btn-join" onclick="loginUser()">login →</button>
        <button class="btn-join" onclick="registerUser()" style="background: var(--accent3); color: #000; margin-top: 8px;">register →</button>
    </div>
</div>

<!-- ═══════════════════ MAIN APP ═══════════════════ -->
<div id="app">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="brand">Live<span>Chat</span></div>
            <div class="brand-sub">// websocket powered</div>
        </div>

        <div class="channels-header">
            <div class="channels-label">Channels</div>
            <div style="display:flex; gap:6px;">
                <button class="btn-new-channel" onclick="loadChannels()" title="Refresh channels">↻</button>
                <button class="btn-new-channel" onclick="openCreateModal()">+ new</button>
            </div>
        </div>

        <div class="channels-list" id="channels-list">
            <!-- populated dynamically -->
        </div>

        <div class="sidebar-footer">
            <div class="user-dot" id="sidebar-avatar">--</div>
            <div class="user-info">
                <div class="user-name" id="sidebar-name">---</div>
                <div class="user-status">● online</div>
            </div>
        </div>
    </div>

    <!-- Chat -->
    <div class="chat-area">
        <div class="chat-header">
            <div class="chat-header-left">
                <div class="chat-header-name"><span class="hash">#</span><span id="header-channel-name">general</span></div>
                <div class="online-badge"><span class="pulse"></span>live</div>
            </div>
        </div>

        <div id="messages"></div>

        <div class="input-bar">
            <div class="input-wrap">
                <textarea id="msg-input" placeholder="message…" rows="1"></textarea>
                <button class="send-btn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
            <div class="typing-hint" id="typing-hint"></div>
        </div>
    </div>
</div>

<!-- ═══════════════════ CREATE CHANNEL MODAL ═══════════════════ -->
<div class="modal-overlay" id="create-modal">
    <div class="modal">
        <button class="modal-close" onclick="closeCreateModal()">✕</button>
        <h2>Create Channel</h2>
        <label>Channel Name</label>
        <input id="new-channel-name" type="text" placeholder="e.g. design-team" maxlength="40" autocomplete="off"/>
        <label>Type</label>
        <select id="new-channel-type">
            <option value="PUBLIC">Public — anyone can join</option>
            <option value="PRIVATE">Private — invite only</option>
        </select>
        <div class="modal-actions">
            <button class="btn-modal secondary" onclick="closeCreateModal()">Cancel</button>
            <button class="btn-modal primary" onclick="createChannel()">Create →</button>
        </div>
    </div>
</div>

<!-- ═══════════════════ INVITE MODAL ═══════════════════ -->
<div class="modal-overlay" id="invite-modal">
    <div class="modal">
        <button class="modal-close" onclick="closeInviteModal()">✕</button>
        <h2>Invite to <span id="invite-channel-label" style="color:var(--accent)"></span></h2>
        <label>Username to invite</label>
        <input id="invite-username" type="text" placeholder="their username" maxlength="24" autocomplete="off"/>
        <div class="modal-actions">
            <button class="btn-modal secondary" onclick="closeInviteModal()">Cancel</button>
            <button class="btn-modal primary" onclick="sendInvite()">Invite →</button>
        </div>
    </div>
</div>

<!-- SockJS + STOMP -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script>
    let stompClient = null;
    let username = null;
    let jwtToken = null;
    let currentChannelId = null;   // channel name (used as ID in routing)
    let currentChannelDbId = null; // actual UUID for invite API
    let channels = [];

    const COLORS = [
        ['#7c6aff','#4a3acc'], ['#ff6a8a','#cc3a5a'], ['#6affd4','#3accaa'],
        ['#ffc96a','#cc993a'], ['#6ab4ff','#3a84cc'], ['#d46aff','#a43acc'],
    ];
    function colorFor(name) {
        let h = 0;
        for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) | 0;
        return COLORS[Math.abs(h) % COLORS.length];
    }
    function getInitials(name) {
        const parts = name.trim().split(/\s+/);
        if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
        return name.substring(0, 2).toUpperCase();
    }

    /* ─── Register ─── */
    async function registerUser() {
        const u = document.getElementById('username-input').value.trim();
        const e = document.getElementById('email-input').value.trim();
        const p = document.getElementById('password-input').value.trim();
        if (!u || !e || !p) { alert('Please fill all fields'); return; }
        try {
            const res = await fetch('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, email: e, password: p })
            });
            const data = await res.json();
            alert(res.ok ? 'Registered! Please login.' : 'Registration failed: ' + (data.message || 'Unknown error'));
        } catch(err) { alert('Registration failed'); }
    }

    /* ─── Login ─── */
    async function loginUser() {
        const u = document.getElementById('username-input').value.trim();
        const p = document.getElementById('password-input').value.trim();
        if (!u || !p) { alert('Please enter username and password'); return; }
        try {
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });
            const data = await res.json();
            if (res.ok) {
                username = u;
                jwtToken = data.token;
                connect();
            } else {
                alert('Login failed: ' + (data.message || 'Invalid credentials'));
            }
        } catch(err) { alert('Login failed'); }
    }

    document.getElementById('password-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') loginUser();
    });

    /* ─── WebSocket ─── */
    function connect() {
        const socket = new SockJS('/ws-chat');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;
        stompClient.connect({ Authorization: 'Bearer ' + jwtToken }, onConnected, onError);
    }

    async function onConnected() {
        const [bg, shadow] = colorFor(username);
        const avatarEl = document.getElementById('sidebar-avatar');
        avatarEl.textContent = getInitials(username);
        avatarEl.style.background = `linear-gradient(135deg, ${bg}, ${shadow})`;
        document.getElementById('sidebar-name').textContent = username;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').classList.add('visible');

        // Load channels from server then join the first one
        await loadChannels();
        if (channels.length > 0) {
            joinChannel(channels[0]);
        }
        stompClient.subscribe('/topic/user.' + username, onInviteReceived);

        document.getElementById('msg-input').focus();
    }

    function onError(err) {
        console.error('STOMP error', err);
        alert('Connection error. Please login again.');
    }

    /* ─── Channel loading ─── */
    async function loadChannels() {
        const refreshBtn = document.querySelector('.channels-header .btn-new-channel');
        if (refreshBtn) refreshBtn.style.opacity = '0.4';
        try {
            const res = await fetch('/channels', {
                headers: { 'Authorization': 'Bearer ' + jwtToken }
            });
            channels = await res.json();
            renderChannelList();
        } catch(err) {
            console.error('Failed to load channels', err);
        } finally {
            if (refreshBtn) refreshBtn.style.opacity = '1';
        }
    }

    function renderChannelList() {
        const list = document.getElementById('channels-list');
        list.innerHTML = '';
        channels.forEach(ch => {
            const isMember = ch.members && ch.members.includes(username);
            const isPublic = ch.type === 'PUBLIC';

            const item = document.createElement('div');
            item.className = 'channel-item' + (currentChannelId === ch.name ? ' active' : '');
            item.dataset.chId = ch.id;
            item.dataset.chName = ch.name;

            // Right-side action button: join (for non-member public), invite (for member), nothing for private non-member
            let actionBtn = '';
            if (isPublic && !isMember) {
                actionBtn = `<button class="btn-invite" title="Join channel"
                onclick="joinPublicChannel(event, '${ch.id}', '${escHtml(ch.name)}')">+ join</button>`;
            } else if (isMember) {
                actionBtn = `<button class="btn-invite" title="Invite user"
                onclick="openInviteModal(event, '${ch.id}', '${escHtml(ch.name)}')">+ invite</button>`;
            }

            item.innerHTML = `
            <span class="hash">#</span>
            <span class="ch-name">${escHtml(ch.name)}</span>
            <span class="ch-type">${ch.type === 'PRIVATE' ? '🔒' : ''}</span>
            ${actionBtn}
        `;

            item.addEventListener('click', (e) => {
                if (e.target.classList.contains('btn-invite')) return;
                if (isPublic && !isMember) {
                    // clicking the channel row itself also joins
                    joinPublicChannel(e, ch.id, ch.name);
                    return;
                }
                if (isMember) joinChannel(ch);
            });

            list.appendChild(item);
        });
    }

    async function joinPublicChannel(e, chId, chName) {
        e.stopPropagation();
        try {
            const res = await fetch(`/channels/${chId}/join`, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + jwtToken }
            });
            if (res.ok) {
                await loadChannels(); // refresh so isMember becomes true
                const ch = channels.find(c => c.id === chId);
                if (ch) joinChannel(ch); // jump right in
            } else {
                alert('Failed to join channel');
            }
        } catch(err) {
            alert('Error joining channel');
        }
    }

    /* ─── Join a channel ─── */
    function joinChannel(ch) {
        if (currentChannelId === ch.name) return;

        // Unsubscribe old
        if (window._currentSub) window._currentSub.unsubscribe();

        currentChannelId = ch.name;
        currentChannelDbId = ch.id;

        document.getElementById('header-channel-name').textContent = ch.name;
        document.getElementById('messages').innerHTML = '';
        document.getElementById('msg-input').placeholder = `message #${ch.name}…`;

        // Subscribe
        window._currentSub = stompClient.subscribe('/topic/channel.' + ch.name, onMessageReceived);

        // Announce join
        stompClient.send('/app/channel.' + ch.name + '.join', {},
            JSON.stringify({ sender: username, type: 'JOIN' }));

        renderChannelList();
    }

    /* ─── Create channel ─── */
    function openCreateModal() { document.getElementById('create-modal').classList.add('open'); }
    function closeCreateModal() {
        document.getElementById('create-modal').classList.remove('open');
        document.getElementById('new-channel-name').value = '';
    }

    async function createChannel() {
        const name = document.getElementById('new-channel-name').value.trim();
        const type = document.getElementById('new-channel-type').value;
        if (!name) { alert('Channel name is required'); return; }

        try {
            const res = await fetch('/channels', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + jwtToken
                },
                body: JSON.stringify({ name, type })
            });
            if (res.ok) {
                const ch = await res.json();
                channels.push(ch);
                renderChannelList();
                closeCreateModal();
                joinChannel(ch);
            } else {
                const data = await res.json();
                alert('Failed to create channel: ' + (data.message || res.statusText));
            }
        } catch(err) { alert('Error creating channel'); }
    }

    /* ─── Invite ─── */
    let inviteTargetId = null;

    function openInviteModal(e, chId, chName) {
        e.stopPropagation();
        inviteTargetId = chId;
        document.getElementById('invite-channel-label').textContent = '#' + chName;
        document.getElementById('invite-username').value = '';
        document.getElementById('invite-modal').classList.add('open');
    }
    function closeInviteModal() { document.getElementById('invite-modal').classList.remove('open'); }

    async function sendInvite() {
        const target = document.getElementById('invite-username').value.trim();
        if (!target) { alert('Enter a username'); return; }
        try {
            const res = await fetch(`/channels/${inviteTargetId}/invite/${target}`, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + jwtToken }
            });
            if (res.ok) {
                alert(`✓ ${target} invited successfully!`);
                closeInviteModal();
            } else {
                const data = await res.json().catch(() => ({}));
                alert('Invite failed: ' + (data.message || res.statusText));
            }
        } catch(err) { alert('Error sending invite'); }
    }

    function onInviteReceived(payload) {
        const msg = JSON.parse(payload.body);
        if (msg.type !== 'INVITE') return;

        console.log('INVITE payload:', msg);
        // msg.channelId carries the invite UUID, msg.content has the message
        showInviteNotification(msg.channelId, msg.content, msg.sender);
    }

    function showInviteNotification(inviteId, channelName, from) {
        const toast = document.createElement('div');
        toast.style.cssText = `
        position:fixed; bottom:24px; right:24px; z-index:999;
        background:var(--surface); border:1px solid var(--accent);
        border-radius:16px; padding:20px 24px; max-width:320px;
        box-shadow:0 8px 32px rgba(0,0,0,.4); animation: slideIn .3s ease;
    `;
        toast.className = 'invite-toast';
        toast.innerHTML = `
        <div style="font-family:'Syne',sans-serif;font-weight:700;margin-bottom:8px;">Channel Invite</div>
        <div style="font-size:.82rem;color:var(--muted);margin-bottom:4px;">
            <span style="color:var(--accent)">${escHtml(from)}</span> invited you to
        </div>
        <div style="font-size:.9rem;color:var(--text);margin-bottom:16px;">
            <span style="color:var(--accent)">#</span>${escHtml(channelName)}
        </div>
        <div style="display:flex;gap:8px;">
            <button onclick="respondInvite('${inviteId}', '${escHtml(channelName)}', true, this)"
                style="flex:1;padding:9px;background:var(--accent);color:#fff;border:none;border-radius:8px;
                       font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;">
                Accept ✓
            </button>
            <button onclick="respondInvite('${inviteId}', '${escHtml(channelName)}', false, this)"
                style="flex:1;padding:9px;background:var(--surface2);color:var(--muted);
                       border:1px solid var(--border);border-radius:8px;
                       font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;">
                Reject ✗
            </button>
        </div>
    `;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 30000);
    }

    async function respondInvite(inviteId, channelName, accept, btn) {
        const toast = btn.closest('.invite-toast');
        toast.querySelectorAll('button').forEach(b => b.disabled = true);

        try {
            const res = await fetch(`/channels/invites/${inviteId}/respond?accept=${accept}`, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + jwtToken }
            });
            if (res.ok) {
                toast.remove();
                if (accept) {
                    await loadChannels(); // refreshes channels array with the new channel
                    await new Promise(r => setTimeout(r, 300));
                    const newChannel = channels.find(ch => ch.name === channelName);
                    if (newChannel) {joinChannel(newChannel);}// auto-jump into it
                    else{alert("Joined! Refresh if channel does not appear")}
                }
            } else {
                toast.querySelectorAll('button').forEach(b => b.disabled = false);
                alert('Failed to respond to invite');
            }
        } catch(err) {
            toast.querySelectorAll('button').forEach(b => b.disabled = false);
            alert('Error responding to invite');
        }
    }

    /* ─── Send message ─── */
    function sendMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if (!text || !stompClient || !currentChannelId) return;
        stompClient.send('/app/channel.' + currentChannelId + '.send', {},
            JSON.stringify({ sender: username, content: text, type: 'CHAT' }));
        input.value = '';
        input.style.height = '24px';
    }

    document.getElementById('msg-input').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    document.getElementById('msg-input').addEventListener('input', function() {
        this.style.height = '24px';
        this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });

    /* ─── Receive message ─── */
    function onMessageReceived(payload) {
        const msg = JSON.parse(payload.body);
        const container = document.getElementById('messages');

        if (msg.type === 'JOIN' || msg.type === 'LEAVE') {
            const el = document.createElement('div');
            el.className = 'system-msg';
            el.textContent = msg.content;
            container.appendChild(el);
        } else {
            const [bg] = colorFor(msg.sender);
            const el = document.createElement('div');
            el.className = 'msg';
            el.innerHTML = `
                <div class="avatar" style="background:${bg}20;color:${bg};border:1px solid ${bg}40">
                    ${msg.avatar || getInitials(msg.sender)}
                </div>
                <div class="msg-body">
                    <div class="msg-meta">
                        <span class="msg-sender" style="color:${bg}">${escHtml(msg.sender)}</span>
                        <span class="msg-time">${msg.timeStamp || ''}</span>
                    </div>
                    <div class="msg-text">${escHtml(msg.content)}</div>
                </div>`;
            container.appendChild(el);
        }
        container.scrollTop = container.scrollHeight;
    }

    function escHtml(s) {
        if (!s) return '';
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // Close modals on overlay click
    document.getElementById('create-modal').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeCreateModal();
    });
    document.getElementById('invite-modal').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeInviteModal();
    });
</script>
</body>
</html>
